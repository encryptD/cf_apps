specVersion: "3.1"
metadata:
  name: gatepass
type: application
framework:
  name: SAPUI5
  version: "1.120.0"
  libraries:
    - name: sap.ui.core
    - name: sap.m
    - name: sap.ui.layout
    - name: themelib_sap_horizon
    - name: themelib_sap_fiori_3
builder:
  resources:
    excludes:
      - "/test/**"
      - "/localService/**"
server:
  settings:
    httpPort: 8080
  customMiddleware:
    - name: ui5-middleware-simpleproxy
      mountPath: /gatepass
      afterMiddleware: compression
      configuration:
        baseUri: http://localhost:4004/gatepass
